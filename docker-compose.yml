version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ch@twoot_pr0d_p@ss_2024!
      POSTGRES_DB: chatwoot_production
    volumes:
      - chatwoot_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - chatwoot_redis_data:/data

  web:
    image: gypson1234/chatwoot-ee:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ['sh', '-c', "bundle exec rails db:prepare && bundle exec rails r 'InstallationConfig.find_or_initialize_by(name: \"INSTALLATION_PRICING_PLAN\").update!(value: \"enterprise\")' 2>/dev/null; bundle exec rails s -p 3000 -b 0.0.0.0"]
    environment:
      - RAILS_ENV=production
      - NODE_ENV=production
      - SECRET_KEY_BASE=44b6c23310a593ea77bd7a491247b5f3def20991c0e4a1186c2e93b4191f2a1e31eff00cf847ed2a488f7109f290ce58d957424bc94e56526e4eabf1c163576e
      - FRONTEND_URL=https://chat.gokortex.com
      - POSTGRES_DATABASE=chatwoot_production
      - POSTGRES_HOST=db
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=ch@twoot_pr0d_p@ss_2024!
      - REDIS_URL=redis://redis:6379/0
      - ACTIVE_STORAGE_SERVICE=local
      - INSTALLATION_PRICING_PLAN=enterprise
      - SMTP_ADDRESS=smtp.zoho.com
      - SMTP_PORT=587
      - SMTP_USERNAME=team@gokortex.com
      - SMTP_PASSWORD=Fegurogyp$$on2024
      - SMTP_DOMAIN=gokortex.com
      - SMTP_AUTHENTICATION=login
      - SMTP_ENABLE_STARTTLS_AUTO=true
      - DEFAULT_COUNTRY_CODE=US
    volumes:
      - chatwoot_storage:/app/storage
    expose:
      - 3000

  worker:
    image: gypson1234/chatwoot-ee:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    environment:
      - RAILS_ENV=production
      - NODE_ENV=production
      - SECRET_KEY_BASE=44b6c23310a593ea77bd7a491247b5f3def20991c0e4a1186c2e93b4191f2a1e31eff00cf847ed2a488f7109f290ce58d957424bc94e56526e4eabf1c163576e
      - FRONTEND_URL=https://chat.gokortex.com
      - POSTGRES_DATABASE=chatwoot_production
      - POSTGRES_HOST=db
      - POSTGRES_USERNAME=postgres
      - POSTGRES_PASSWORD=ch@twoot_pr0d_p@ss_2024!
      - REDIS_URL=redis://redis:6379/0
      - ACTIVE_STORAGE_SERVICE=local
      - INSTALLATION_PRICING_PLAN=enterprise
      - SMTP_ADDRESS=smtp.zoho.com
      - SMTP_PORT=587
      - SMTP_USERNAME=team@gokortex.com
      - SMTP_PASSWORD=Fegurogyp$$on2024
      - SMTP_DOMAIN=gokortex.com
      - SMTP_AUTHENTICATION=login
      - SMTP_ENABLE_STARTTLS_AUTO=true
      - DEFAULT_COUNTRY_CODE=US
    volumes:
      - chatwoot_storage:/app/storage

volumes:
  chatwoot_db_data:
  chatwoot_redis_data:
  chatwoot_storage:
